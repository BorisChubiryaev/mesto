<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesto</title>
  <link rel="stylesheet" href="./pages/index.css">
</head>
<body>

    <div class="page">

        <header class="header">
            <img class="header__logo" src="./images/logo/VectorlogoWhite.svg" alt="Логотип">
        </header>

        <main>
            <section class="profile">
                <img class="profile__avatar" src="./images/image.jpg" alt="Фото профиля">
                <div class="profile__info">
                    <div class="profile__name-side">
                        <h2 class="profile__name">Жак-Ив Кусто</h2>
                        <button class="button profile__edit-button" type="button"></button>
                    </div>
                    <p class="profile__description">Исследователь океана</p>
                </div>
                <button class="button profile__add-button" type="button"></button>
            </section>

            <section class="elements"></section>
            
        </main>

        <footer class="footer">
            <p class="footer__copyright">© 2022 Mesto Russia</p>
        </footer>
    
        <div class="popup popup_container">
            <form class="popup__form popup__form_profile">
                <h3 class="popup__title">Редактировать профиль</h3>
                <input class="popup__input popup__input-name" name="name" placeholder="Введите имя" value="Жак-Ив Кусто" required>
                <input class="popup__input popup__input-about" name="about" placeholder="О себе" value="Исследователь океана" required>
                <button class="button popup__save" type="submit">Сохранить</button>
                <button class="button popup__close popup__close-edit" type="button"></button>
            </form>
        </div>

        <div class="popup popup_add">
            <form class="popup__form popup__form-card">
                <h3 class="popup__title">Новое место</h3>
                <input class="popup__input popup__input-name popup__form-input-name" placeholder="Название" value="" required>
                <input class="popup__input popup__input-about popup__form-input-url" placeholder="Ссыолка на картинку" value="" required>
                <button class="button popup__save" type="submit">Сохранить</button>
                <button class="button popup__close" id="popup__close_card" type="button"></button>
            </form>
        </div>
    </div>

    <div class="popup popup_picture">
        <div class="popup__place">
          <button class="button popup__close popup__close-image" type="button"></button>
          <img class="popup__image" alt="#" src="#">
          <p class="popup__image-description"></p>
        </div>
    </div>

    <template class="template-element">
        <div class="element">
            <img class="element__photo" src="#" alt="#">
            <div class="element__description">
                <h3 class="element__title"></h3>
                <button class="button element__like" type="button"></button>
            </div>
            <button class="button element__delete" type="button"></button>
        </div>
    </template>

    <script src="./scripts/index.js"></script>
    
</body>
</html>
