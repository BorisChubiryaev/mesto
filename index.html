<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Путешествия по России</title>
  <link rel="stylesheet" href="./pages/index.css">
</head>
<body>
    <div class="page">
      <div class="media">  
        <header class="header">
            <img class="header__logo" src="./images/logo/VectorlogoWhite.svg" alt="Логотип">
        </header>

        <section class="profile">
            <img class="profile__avatar" src="./images/image.jpg" alt="Фото профиля">
            <div class="profile__info">
                <p class="profile__name">Жак-Ив Кусто</p>
                <button type="button" class="button profile__edit-button"></button>
                <p class="profile__description">Исследователь океана</p>
            </div>
            <button class="button profile__add-button"></button>
        </section>

        <section class="elements">
            <div class="element">
                <img class="element__photo" src="./images/1.jpg" alt="Фото карточки">
                <div class="description">
                    <h3 class="description__title">Карачаевск</h3>
                    <button class="button description__like"></button>
                </div>
            </div>
            <div class="element">
                <img class="element__photo" src="./images/2.jpg" alt="Фото карточки">
                <div class="description">
                    <h3 class="description__title">Гора Эльбрус</h3>
                    <button class="button description__like"></button>
                </div>
            </div>
            <div class="element">
                <img class="element__photo" src="./images/3.jpg" alt="Фото карточки">
                <div class="description">
                    <h3 class="description__title">Домбай</h3>
                    <button class="button description__like"></button>
                </div>
            </div>
            <div class="element">
                <img class="element__photo" src="./images/4.jpg" alt="Фото карточки">
                <div class="description">
                    <h3 class="description__title">Гора Эльбрус</h3>
                    <button class="button description__like"></button>
                </div>
            </div>
            <div class="element">
                <img class="element__photo" src="./images/5.jpg" alt="Фото карточки">
                <div class="description">
                    <h3 class="description__title">Домбай</h3>
                    <button class="button description__like"></button>
                </div>
            </div>
            <div class="element">
                <img class="element__photo" src="./images/6.jpg" alt="Фото карточки">
                <div class="description">
                    <h3 class="description__title">Карачаево</h3>
                    <button class="button description__like"></button>
                </div>
            </div>
        </section>

        <footer class="footer">
            <p class="footer__copyright">© 2022 Mesto Russia</p>
        </footer>
        <div class="popup">
            <div class="popup__container">
                <form class="popup__form">
                    <h3 class="popup__title">Редактировать профиль</h3>
                        <label class="popap__field">
                            <input class="popup__input popup__input-name" placeholder="Введите имя" value="Жак-Ив Кусто" required>
                            <input class="popup__input popup__input-about" placeholder="О себе" value="Исследователь океана" required>
                        </label>
                    <button class="button popup__save" type="submit">Сохранить</button>
                    <button class="button popup__close"></button>
                </form>
            </div>
        </div>
      </div>
    </div>
    <script src="./scripts/index.js"></script>
</body>
