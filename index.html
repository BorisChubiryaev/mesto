<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesto</title>
  <link rel="stylesheet" href="./pages/index.css">
</head>
<body>

    <div class="page">

        <header class="header">
            <img class="header__logo" src="./images/logo/VectorlogoWhite.svg" alt="Логотип">
        </header>

        <main>
            <section class="profile">
                <img class="profile__avatar" src="./images/image.jpg" alt="Фото профиля">
                <div class="profile__info">
                    <div class="profile__name-side">
                        <h2 class="profile__name">Жак-Ив Кусто</h2>
                        <button class="button profile__edit-button" type="button"></button>
                    </div>
                    <p class="profile__description">Исследователь океана</p>
                </div>
                <button class="button profile__add-button"></button>
            </section>

            <section class="elements">
                <div class="element">
                    <img class="element__photo" src="./images/1.jpg" alt="Фото старого здания Карачаевска">
                    <div class="element__description">
                        <h3 class="element__title">Карачаевск</h3>
                        <button class="button element__like element__like_active" type="button"></button>
                    </div>
                </div>
                <div class="element">
                    <img class="element__photo" src="./images/2.jpg" alt="Фото горы Эльбрус">
                    <div class="element__description">
                        <h3 class="element__title">Гора Эльбрус</h3>
                        <button class="button element__like element__like_active" type="button"></button>
                    </div>
                </div>
                <div class="element">
                    <img class="element__photo" src="./images/3.jpg" alt="Фото горы Домбай">
                    <div class="element__description">
                        <h3 class="element__title">Домбай</h3>
                        <button class="button element__like element__like_active" type="button"></button>
                    </div>
                </div>
                <div class="element">
                    <img class="element__photo" src="./images/4.jpg" alt="Фото горы Эльбрус">
                    <div class="element__description">
                        <h3 class="element__title">Гора Эльбрус</h3>
                        <button class="button element__like element__like_active" type="button"></button>
                    </div>
                </div>
                <div class="element">
                    <img class="element__photo" src="./images/5.jpg" alt="Фото горы Домбай">
                    <div class="element__description">
                        <h3 class="element__title">Домбай</h3>
                        <button class="button element__like element__like_active" type="button"></button>
                    </div>
                </div>
                <div class="element">
                    <img class="element__photo" src="./images/6.jpg" alt="Фото старого здания Карачаевска">
                    <div class="element__description">
                        <h3 class="element__title">Карачаево-Черкесск</h3>
                        <button class="button element__like element__like_active" type="button"></button>
                    </div>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p class="footer__copyright">© 2022 Mesto Russia</p>
        </footer>
        
        <div class="popup">
            <div class="popup__container">
                <form class="popup__form">
                    <h3 class="popup__title">Редактировать профиль</h3>
                    <input class="popup__input popup__input-name" placeholder="Введите имя" value="Жак-Ив Кусто" required>
                    <input class="popup__input popup__input-about" placeholder="О себе" value="Исследователь океана" required>
                    <button class="button popup__save" type="submit">Сохранить</button>
                    <button class="button popup__close" type="button"></button>
                </form>
            </div>
        </div>
    </div>
    <script src="./scripts/index.js"></script>
</body>
</html>
